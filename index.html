<div class="fish-title">joseph the pleco</div>
<div class="subtitle">remote light controller</div>

<button class="power-btn" id="power-btn" aria-label="power">
  <svg class="power-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
    <line x1="12" y1="2" x2="12" y2="12"/>
  </svg>
</button>

<div class="status-bar">
  <div class="status-dot" id="dot"></div>
  <span id="status-text">tap power to start</span>
</div>

<div class="chip-row">
  <button class="chip-btn call" id="chip-call" aria-label="call joseph">
    <span class="chip-icon">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </span>
    <span>call</span>
  </button>
  <button class="chip-btn default-chip" id="chip-default" aria-label="default preset">
    <span class="chip-icon">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#93c5fd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </span>
    <span>default</span>
  </button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="modes">modes</button>
  <button class="tab-btn" data-tab="pixels">pixels</button>
  <button class="tab-btn" data-tab="snake">snake</button>
</div>

<!-- ===== Modes tab ===== -->
<div class="tab-panel active" id="tab-modes">

  <div class="section-label">feelings</div>
  <div class="arc-wrap">
    <svg class="arc-center-fish" viewBox="0 0 140 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M 48 22 Q 56 5 76 8 Q 84 11 86 22 Z" opacity="0.55"/>
      <path d="M 22 34 Q 24 23 42 21 Q 70 19 95 26 Q 106 29 117 31 L 117 35 Q 100 38 70 39 Q 42 40 22 36 Q 20 34 22 34 Z"/>
      <path d="M 115 26 L 134 16 L 132 40 L 115 36 Z"/>

      <circle cx="33" cy="28" r="1.4" fill="#020617"/>
    </svg>
    <button class="arc-item arc-1" data-preset="3" data-name="happy">
      <span class="arc-icon">😊</span>
      <span class="arc-label">happy</span>
    </button>
    <button class="arc-item arc-2" data-preset="19" data-name="shock">
      <span class="arc-icon">🫨</span>
      <span class="arc-label">shock</span>
    </button>
    <button class="arc-item arc-3" data-preset="2" data-name="neutral">
      <span class="arc-icon">😐</span>
      <span class="arc-label">neutral</span>
    </button>
    <button class="arc-item arc-4" data-preset="18" data-name="sad">
      <span class="arc-icon">😢</span>
      <span class="arc-label">sad</span>
    </button>
    <button class="arc-item arc-5" data-preset="5" data-name="angry">
      <span class="arc-icon">😠</span>
      <span class="arc-label">angry</span>
    </button>
    <button class="arc-item arc-6" data-preset="15" data-name="livid">
      <span class="arc-icon">🤬</span>
      <span class="arc-label">livid</span>
    </button>
  </div>

  <div class="section-label">fun</div>
  <div class="presets-grid">
    <button class="preset-btn disco" style="--accent:#f472b6" data-preset="6" data-name="disco">
      <div class="preset-icon-wrap"><span class="preset-icon">🪩</span></div>
      <div class="preset-text"><div class="preset-name">disco</div><div class="preset-desc">rainbow lights</div></div>
    </button>
    <button class="preset-btn" style="--accent:#f87171" data-preset="8" data-name="red herring">
      <div class="preset-icon-wrap"><span class="preset-icon">🦑</span></div>
      <div class="preset-text"><div class="preset-name">red herring</div><div class="preset-desc">a mystery...</div></div>
    </button>
  </div>

  <div class="morse-section">
    <button class="morse-btn" data-preset="9" data-name="hey">
      <div class="morse-icon">✉️</div>
      <div class="morse-body">
        <div class="morse-code">···· · -·--</div>
      </div>
      <div class="morse-arrow">→</div>
    </button>
  </div>

  <div class="section-label">time of day</div>
  <div class="day-row">
    <button class="day-btn morning" data-preset="13" data-name="good morning">
      <span class="day-icon">🌅</span>
      <span class="day-name">good morning</span>
      <span class="day-sub">sunrise · warm</span>
    </button>
    <button class="day-btn evening" data-preset="14" data-name="good evening">
      <span class="day-icon">🌆</span>
      <span class="day-name">good evening</span>
      <span class="day-sub">dusk · soft</span>
    </button>
  </div>

  <div class="custom-section">
    <div class="custom-label">any preset</div>
    <div class="custom-row">
      <input class="custom-input" type="number" id="custom-num" placeholder="20, 21, 22..." min="1" max="250"/>
      <button class="send-btn" id="custom-send">send →</button>
    </div>
  </div>
</div>

  <div class="snake-score-row">
    <div class="snake-score">score: <span id="snake-score">0</span></div>
    <button class="snake-start-btn" id="snake-start">start</button>
  </div>

  <div class="snake-grid" id="snake-grid"></div>

  <div class="dpad">
    <button class="dpad-btn" id="dpad-up">▲</button>
    <div class="dpad-middle">
      <button class="dpad-btn" id="dpad-left">◀</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="dpad-right">▶</button>
    </div>
    <button class="dpad-btn" id="dpad-down">▼</button>
  </div>

  <div class="snake-status" id="snake-status">tap start · connect first</div>
</div>

<div class="log-wrap">
  <button class="log-toggle" id="log-toggle">
    <span class="chev">▾</span> <span>console</span>
  </button>
  <div class="log" id="log">
    <div class="log-entry info">tap the power button to start</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pixels.js"></script>
<script src="js/snake.js"></script>
</body>
</html>
