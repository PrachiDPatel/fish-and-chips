<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>joseph the pleco · controller</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M 26 14 Q 32 10 36 14 Q 38 18 36 22 Z' fill='%2367e8f9' opacity='0.85'/><path d='M 8 32 Q 10 22 24 20 Q 40 18 50 26 L 58 18 L 58 46 L 50 38 Q 40 46 24 44 Q 10 42 8 32 Z' fill='%2322d3ee'/><path d='M 18 38 Q 22 46 30 44' fill='%2367e8f9' opacity='0.7'/><circle cx='18' cy='28' r='2.4' fill='%23083344'/></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg-0: #020617;
    --bg-1: #031530;
    --bg-2: #06243d;
    --cyan-soft: #67e8f9;
    --cyan-bright: #22d3ee;
    --text: #e0f2fe;
    --muted: #64748b;
  }

  html { background: #020617; overscroll-behavior: none; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(2.5rem, env(safe-area-inset-top)) 1rem max(3rem, env(safe-area-inset-bottom));
    background:
      radial-gradient(ellipse at 50% -10%, rgba(34, 211, 238, 0.20), transparent 55%),
      radial-gradient(ellipse at 10% 110%, rgba(167, 139, 250, 0.08), transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    background-attachment: fixed;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(circle at 25% 30%, rgba(34, 211, 238, 0.10) 0, transparent 35%),
      radial-gradient(circle at 75% 65%, rgba(8, 145, 178, 0.09) 0, transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(125, 211, 252, 0.06) 0, transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(244, 114, 182, 0.04) 0, transparent 30%);
    filter: blur(40px);
    animation: drift 24s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-3%, 2%) scale(1.05); }
    100% { transform: translate(2%, -2%) scale(1); }
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -10px;
    left: -20px;
    right: -20px;
    height: 90px;
    background:
      radial-gradient(ellipse at 12% 100%, rgba(8, 145, 178, 0.30) 0, transparent 50%),
      radial-gradient(ellipse at 88% 100%, rgba(8, 145, 178, 0.30) 0, transparent 50%),
      radial-gradient(ellipse at 50% 105%, rgba(2, 6, 23, 0.6) 0, transparent 70%);
    filter: blur(8px);
    z-index: 0;
    pointer-events: none;
    opacity: 0.7;
  }

  /* Bubbles */
  .bubbles { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .bubble {
    position: absolute;
    bottom: -40px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(186, 230, 253, 0.4), rgba(125, 211, 252, 0.08) 60%, transparent 70%);
    box-shadow: inset 0 0 4px rgba(224, 242, 254, 0.3);
    animation: rise linear infinite;
    opacity: 0;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 0.6; }
    50%  { transform: translateY(-50vh) translateX(8px); }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) translateX(-6px); opacity: 0; }
  }
  .bubble:nth-child(1)  { left:  4%; width: 10px; height: 10px; animation-duration: 26s; animation-delay: 0s; }
  .bubble:nth-child(2)  { left: 13%; width:  6px; height:  6px; animation-duration: 20s; animation-delay: 4s; }
  .bubble:nth-child(3)  { left: 21%; width: 14px; height: 14px; animation-duration: 30s; animation-delay: 9s; }
  .bubble:nth-child(4)  { left: 28%; width:  8px; height:  8px; animation-duration: 22s; animation-delay: 2s; }
  .bubble:nth-child(5)  { left: 36%; width:  5px; height:  5px; animation-duration: 18s; animation-delay: 12s; }
  .bubble:nth-child(6)  { left: 44%; width: 11px; height: 11px; animation-duration: 28s; animation-delay: 6s; }
  .bubble:nth-child(7)  { left: 51%; width:  7px; height:  7px; animation-duration: 24s; animation-delay: 15s; }
  .bubble:nth-child(8)  { left: 58%; width:  4px; height:  4px; animation-duration: 16s; animation-delay: 10s; }
  .bubble:nth-child(9)  { left: 64%; width:  9px; height:  9px; animation-duration: 23s; animation-delay: 5s; }
  .bubble:nth-child(10) { left: 71%; width: 12px; height: 12px; animation-duration: 29s; animation-delay: 1s; }
  .bubble:nth-child(11) { left: 78%; width:  6px; height:  6px; animation-duration: 21s; animation-delay: 14s; }
  .bubble:nth-child(12) { left: 84%; width:  8px; height:  8px; animation-duration: 27s; animation-delay: 7s; }
  .bubble:nth-child(13) { left: 91%; width:  5px; height:  5px; animation-duration: 19s; animation-delay: 3s; }
  .bubble:nth-child(14) { left: 96%; width: 10px; height: 10px; animation-duration: 25s; animation-delay: 11s; }
  .bubble:nth-child(15) { left: 18%; width:  4px; height:  4px; animation-duration: 17s; animation-delay: 8s; }
  .bubble:nth-child(16) { left: 67%; width:  6px; height:  6px; animation-duration: 22s; animation-delay: 13s; }

  .tap-bubble {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(186, 230, 253, 0.55), rgba(125, 211, 252, 0.12) 60%, transparent 70%);
    pointer-events: none;
    z-index: 100;
    animation: tapRise 1.3s ease-out forwards;
  }
  @keyframes tapRise {
    0%   { transform: translate(0, 0) scale(0.4); opacity: 0.85; }
    100% { transform: translate(var(--dx, 0), -70px) scale(1.1); opacity: 0; }
  }

  /* Background fish */
  .fish-layer { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .pleco, .neon { position: absolute; height: auto; will-change: transform; }
  .pleco { filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.15)); }
  .neon  { filter: drop-shadow(0 0 6px rgba(244, 114, 182, 0.45)); }

  .pleco-1  { top: 8%;  width: 130px; color: rgba(125, 211, 252, 0.13); animation: plecoSwimL 62s linear infinite; animation-delay: -8s; }
  .pleco-2  { top: 18%; width:  72px; color: rgba(167, 139, 250, 0.10); animation: plecoSwimR 48s linear infinite; animation-delay: -20s; }
  .pleco-3  { top: 26%; width:  62px; color: rgba(125, 211, 252, 0.11); animation: plecoSwimL 75s linear infinite; animation-delay: -3s; }
  .pleco-4  { top: 34%; width:  90px; color: rgba(165, 243, 252, 0.09); animation: plecoSwimR 56s linear infinite; animation-delay: -35s; }
  .pleco-5  { top: 42%; width:  50px; color: rgba(186, 230, 253, 0.10); animation: plecoSwimL 90s linear infinite; animation-delay: -12s; }
  .pleco-6  { top: 48%; width: 110px; color: rgba(125, 211, 252, 0.08); animation: plecoSwimR 70s linear infinite; animation-delay: -55s; }
  .pleco-7  { top: 56%; width:  80px; color: rgba(167, 139, 250, 0.09); animation: plecoSwimL 64s linear infinite; animation-delay: -18s; }
  .pleco-8  { top: 62%; width:  44px; color: rgba(125, 211, 252, 0.12); animation: plecoSwimR 42s linear infinite; animation-delay: -7s; }
  .pleco-9  { top: 70%; width:  98px; color: rgba(125, 211, 252, 0.10); animation: plecoSwimL 78s linear infinite; animation-delay: -45s; }
  .pleco-10 { top: 76%; width:  60px; color: rgba(186, 230, 253, 0.11); animation: plecoSwimR 52s linear infinite; animation-delay: -22s; }
  .pleco-11 { top: 82%; width: 120px; color: rgba(125, 211, 252, 0.08); animation: plecoSwimL 88s linear infinite; animation-delay: -2s; }
  .pleco-12 { top: 88%; width:  56px; color: rgba(167, 139, 250, 0.10); animation: plecoSwimR 60s linear infinite; animation-delay: -38s; }
  .pleco-13 { top: 14%; width:  46px; color: rgba(165, 243, 252, 0.09); animation: plecoSwimR 96s linear infinite; animation-delay: -65s; }
  .pleco-14 { top: 92%; width:  38px; color: rgba(125, 211, 252, 0.10); animation: plecoSwimL 50s linear infinite; animation-delay: -15s; }

  .neon-1 { top: 11%; width: 36px; color: rgba(244, 114, 182, 0.35); animation: neonSwimR 38s linear infinite; animation-delay: -4s; }
  .neon-2 { top: 31%; width: 28px; color: rgba(96,  165, 250, 0.40); animation: neonSwimL 33s linear infinite; animation-delay: -16s; }
  .neon-3 { top: 53%; width: 32px; color: rgba(110, 231, 183, 0.32); animation: neonSwimR 41s linear infinite; animation-delay: -11s; }
  .neon-4 { top: 67%; width: 26px; color: rgba(251, 191, 36,  0.30); animation: neonSwimL 36s linear infinite; animation-delay: -26s; }
  .neon-5 { top: 79%; width: 30px; color: rgba(244, 114, 182, 0.30); animation: neonSwimR 44s linear infinite; animation-delay: -7s; }
  .neon-6 { top: 23%; width: 22px; color: rgba(125, 211, 252, 0.45); animation: neonSwimL 30s linear infinite; animation-delay: -19s; }
  .neon-7 { top: 45%; width: 24px; color: rgba(167, 139, 250, 0.40); animation: neonSwimR 28s linear infinite; animation-delay: -2s; }

  @keyframes plecoSwimL {
    0%   { transform: translateX(110vw) translateY(0)    rotate(0deg); }
    20%  { transform: translateX(75vw)  translateY(-18px) rotate(-3deg); }
    40%  { transform: translateX(50vw)  translateY(12px)  rotate(2deg); }
    60%  { transform: translateX(28vw)  translateY(-8px)  rotate(-2deg); }
    80%  { transform: translateX(8vw)   translateY(14px)  rotate(2deg); }
    100% { transform: translateX(-220px) translateY(0)    rotate(0deg); }
  }
  @keyframes plecoSwimR {
    0%   { transform: translateX(-220px) translateY(0)    rotate(0deg) scaleX(-1); }
    20%  { transform: translateX(15vw)   translateY(-14px) rotate(3deg)  scaleX(-1); }
    40%  { transform: translateX(35vw)   translateY(10px)  rotate(-2deg) scaleX(-1); }
    60%  { transform: translateX(60vw)   translateY(-12px) rotate(2deg)  scaleX(-1); }
    80%  { transform: translateX(85vw)   translateY(8px)   rotate(-2deg) scaleX(-1); }
    100% { transform: translateX(110vw)  translateY(0)    rotate(0deg) scaleX(-1); }
  }
  @keyframes neonSwimL {
    0%   { transform: translateX(110vw) translateY(0)    rotate(0); }
    50%  { transform: translateX(50vw)  translateY(-22px) rotate(-4deg); }
    100% { transform: translateX(-100px) translateY(0)   rotate(0); }
  }
  @keyframes neonSwimR {
    0%   { transform: translateX(-100px) translateY(0)   rotate(0)    scaleX(-1); }
    50%  { transform: translateX(50vw)   translateY(20px) rotate(4deg) scaleX(-1); }
    100% { transform: translateX(110vw)  translateY(0)   rotate(0)    scaleX(-1); }
  }

  body > :not(.bubbles):not(.fish-layer) { position: relative; z-index: 1; }

  /* Header */
  .fish-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    color: #cffafe;
    margin-bottom: 0.2rem;
    text-align: center;
    text-shadow: 0 0 24px rgba(34, 211, 238, 0.4), 0 0 2px rgba(207, 250, 254, 0.6);
    letter-spacing: 0.005em;
    animation: titleBob 9s ease-in-out infinite;
  }
  @keyframes titleBob {
    0%, 100% { transform: translateY(0) rotate(-0.3deg); }
    50%      { transform: translateY(-2px) rotate(0.3deg); }
  }
  .subtitle {
    font-size: 0.72rem;
    color: var(--cyan-soft);
    text-align: center;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    opacity: 0.65;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .subtitle::before, .subtitle::after {
    content: '~ ~ ~';
    color: #0e7490;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }

  /* Power button (centered, prominent) */
  .power-btn {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 28%, rgba(34, 211, 238, 0.16), rgba(2, 6, 23, 0.75));
    border: 1px solid rgba(34, 211, 238, 0.3);
    cursor: pointer;
    margin: 0 auto 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 0 28px -8px rgba(34, 211, 238, 0.25), inset 0 1px 0 rgba(207, 250, 254, 0.08);
    -webkit-appearance: none; appearance: none;
    touch-action: manipulation;
  }
  .power-btn::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 0.5px solid rgba(34, 211, 238, 0.12);
    pointer-events: none;
    transition: all 0.35s ease;
  }
  .power-icon { width: 40px; height: 40px; color: #7dd3fc; filter: drop-shadow(0 0 4px rgba(34, 211, 238, 0.3)); transition: all 0.35s ease; }
  .power-btn:active { transform: scale(0.93); }
  .power-btn.on {
    border-color: rgba(110, 231, 183, 0.55);
    background: radial-gradient(circle at 30% 28%, rgba(52, 211, 153, 0.22), rgba(6, 78, 59, 0.4));
    box-shadow: 0 0 42px -4px rgba(52, 211, 153, 0.5), inset 0 0 22px rgba(52, 211, 153, 0.12);
    animation: powerGlow 3.5s ease-in-out infinite;
  }
  .power-btn.on .power-icon { color: #d1fae5; filter: drop-shadow(0 0 12px rgba(110, 231, 183, 0.7)); }
  .power-btn.on::before { inset: -15px; border-color: rgba(110, 231, 183, 0.25); }
  .power-btn.connecting { animation: connectingPulse 1s ease-in-out infinite; }
  .power-btn.error { border-color: rgba(248, 113, 113, 0.55); box-shadow: 0 0 28px -4px rgba(248, 113, 113, 0.35); }
  .power-btn.error .power-icon { color: #fca5a5; }
  @keyframes powerGlow {
    0%, 100% { box-shadow: 0 0 38px -4px rgba(52, 211, 153, 0.42), inset 0 0 22px rgba(52, 211, 153, 0.10); }
    50%      { box-shadow: 0 0 56px -2px rgba(52, 211, 153, 0.65), inset 0 0 28px rgba(52, 211, 153, 0.18); }
  }
  @keyframes connectingPulse {
    0%, 100% { box-shadow: 0 0 24px -8px rgba(34, 211, 238, 0.4); }
    50%      { box-shadow: 0 0 44px -2px rgba(34, 211, 238, 0.75); }
  }

  /* Status pill */
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    background: rgba(8, 145, 178, 0.06);
    border: 0.5px solid rgba(34, 211, 238, 0.20);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    color: #7dd3fc;
    margin-bottom: 1rem;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #334155; transition: background 0.3s, box-shadow 0.3s; }
  .status-dot.sending { background: #60a5fa; box-shadow: 0 0 8px #60a5fa; animation: pulse 1s infinite; }
  .status-dot.success { background: #34d399; box-shadow: 0 0 10px rgba(52, 211, 153, 0.7); }
  .status-dot.error   { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.6); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* Quick chips below power: [call] [default] */
  .chip-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 1.75rem;
  }
  .chip-btn {
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.55), rgba(2, 6, 23, 0.55));
    border: 0.5px solid rgba(34, 211, 238, 0.25);
    color: #cffafe;
    border-radius: 14px;
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    touch-action: manipulation;
    min-height: 46px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: inset 0 1px 0 rgba(207, 250, 254, 0.06);
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s, border-color 0.25s;
  }
  .chip-btn:active { transform: scale(0.95); filter: brightness(1.5); }
  .chip-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .chip-btn.call {
    border-color: rgba(74, 222, 128, 0.45);
    box-shadow: 0 0 18px -6px rgba(74, 222, 128, 0.55), inset 0 1px 0 rgba(74, 222, 128, 0.10);
    color: #bbf7d0;
  }
  .chip-btn.call .chip-icon {
    background: radial-gradient(circle at 30% 30%, rgba(74, 222, 128, 0.45), rgba(6, 78, 59, 0.6));
    border: 0.5px solid rgba(74, 222, 128, 0.6);
    box-shadow: inset 0 0 6px rgba(74, 222, 128, 0.3);
    animation: callRing 2.4s ease-in-out infinite;
  }
  @keyframes callRing {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-10deg); }
    50% { transform: rotate(0); }
    75% { transform: rotate(10deg); }
  }
  .chip-btn.default-chip {
    border-color: rgba(96, 165, 250, 0.45);
    box-shadow: 0 0 18px -6px rgba(96, 165, 250, 0.55), inset 0 1px 0 rgba(96, 165, 250, 0.10);
    color: #dbeafe;
  }
  .chip-btn.default-chip .chip-icon {
    background: radial-gradient(circle at 30% 30%, rgba(96, 165, 250, 0.45), rgba(30, 58, 138, 0.5));
    border: 0.5px solid rgba(96, 165, 250, 0.6);
    box-shadow: inset 0 0 6px rgba(96, 165, 250, 0.3);
  }

  /* Tab bar (just modes | pixels) */
  .tab-bar {
    display: flex;
    width: 100%;
    max-width: 380px;
    background: rgba(8, 47, 73, 0.45);
    border: 0.5px solid rgba(34, 211, 238, 0.22);
    border-radius: 14px;
    padding: 4px;
    gap: 2px;
    margin-bottom: 1.5rem;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(207, 250, 254, 0.05);
  }
  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: #7dd3fc;
    padding: 11px 12px;
    font-size: 12px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    touch-action: manipulation;
    min-height: 38px;
    opacity: 0.7;
  }
  .tab-btn.active {
    background: linear-gradient(160deg, rgba(34, 211, 238, 0.18), rgba(8, 145, 178, 0.10));
    color: #cffafe;
    opacity: 1;
    box-shadow: 0 0 14px -4px rgba(34, 211, 238, 0.4), inset 0 1px 0 rgba(207, 250, 254, 0.1);
  }

  .tab-panel { width: 100%; max-width: 380px; display: none; flex-direction: column; align-items: stretch; }
  .tab-panel.active { display: flex; }

  /* Section labels */
  .section-label {
    font-size: 10.5px;
    color: var(--cyan-soft);
    opacity: 0.7;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    width: 100%;
    margin-bottom: 12px;
    margin-top: 1.6rem;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(34, 211, 238, 0.3), transparent);
  }
  .section-label:first-child { margin-top: 0; }

  /* ===== Feelings semicircle ===== */
  .arc-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 380 / 280;
    margin: 0 auto 0.5rem;
  }
  .arc-wrap::before {
    content: '';
    position: absolute;
    left: 6%; right: 6%;
    bottom: 18%;
    height: 50%;
    border: 0.5px dashed rgba(34, 211, 238, 0.12);
    border-bottom: none;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    pointer-events: none;
  }
  .arc-center-fish {
    position: absolute;
    left: 50%;
    top: 79%;
    width: 30%;
    transform: translate(-50%, -50%);
    color: rgba(125, 211, 252, 0.22);
    fill: currentColor;
    pointer-events: none;
    filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.15));
    animation: centerFishBob 7s ease-in-out infinite;
  }
  @keyframes centerFishBob {
    0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
    50%      { transform: translate(-50%, -53%) rotate(2deg); }
  }
  .arc-item {
    position: absolute;
    width: 22%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.42), rgba(2, 6, 23, 0.55));
    border: 1px solid rgba(34, 211, 238, 0.18);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 0 14px -4px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.06);
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s, border-color 0.25s;
    animation: bioGlow 7s ease-in-out infinite;
    color: var(--text);
    padding: 0;
  }
  @keyframes bioGlow {
    0%, 100% { box-shadow: 0 0 12px -4px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.05); }
    50%      { box-shadow: 0 0 22px -3px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.08); }
  }
  .arc-item:active { transform: scale(0.93); filter: brightness(1.5); }
  .arc-item.active {
    border-color: var(--accent);
    box-shadow: 0 0 22px -2px var(--accent), 0 0 48px -10px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.1);
    animation: none;
  }
  .arc-icon { font-size: 22px; line-height: 1; }
  .arc-label {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    line-height: 1.1;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.02em;
    padding: 0 4px;
  }
  /* Semicircle positions + vaguely-rainbow accents (still matching each emotion) */
  .arc-1 { left: 0.5%;  top: 71.4%; --accent: #ec4899; animation-delay: -0.5s; } /* happy — pink */
  .arc-2 { left: 8.2%;  top: 40.0%; --accent: #fb923c; animation-delay: -2.0s; } /* shock — orange */
  .arc-3 { left: 27.9%; top: 20.4%; --accent: #fbbf24; animation-delay: -3.5s; } /* neutral — amber */
  .arc-4 { left: 52.1%; top: 20.4%; --accent: #06b6d4; animation-delay: -5.0s; } /* sad — cyan */
  .arc-5 { left: 71.8%; top: 40.0%; --accent: #a855f7; animation-delay: -6.5s; } /* angry — violet */
  .arc-6 { left: 79.5%; top: 71.4%; --accent: #ef4444; animation-delay: -1.2s; } /* livid — red */

  /* ===== Fun row (disco, red herring) ===== */
  .presets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .presets-grid > .preset-btn:last-child:nth-child(odd) {
    grid-column: 1 / -1;
    max-width: calc(50% - 5px);
    justify-self: center;
  }
  .preset-btn {
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.40), rgba(2, 6, 23, 0.50));
    border: 0.5px solid rgba(34, 211, 238, 0.13);
    border-radius: 14px;
    padding: 0.7rem 0.85rem;
    cursor: pointer;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s cubic-bezier(.34,1.56,.64,1);
    text-align: left;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    min-height: 68px;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 11px;
    box-shadow: inset 0 1px 0 rgba(207, 250, 254, 0.05);
    animation: bioGlow 7s ease-in-out infinite;
  }
  .preset-btn:nth-child(3n)   { animation-delay: -2.3s; }
  .preset-btn:nth-child(3n+1) { animation-delay: -4.7s; }
  .preset-btn:nth-child(3n+2) { animation-delay: -1.1s; }
  .preset-btn::after {
    content: '';
    position: absolute;
    top: -40%; right: -30%;
    width: 70%; height: 100%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
    opacity: 0.09;
    pointer-events: none;
  }
  .preset-btn:active { transform: scale(0.97); filter: brightness(1.5); }
  .preset-btn.active {
    border-color: var(--accent);
    box-shadow: 0 0 22px -2px var(--accent), 0 0 48px -10px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.1);
    animation: none;
  }
  .preset-icon-wrap {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    background: radial-gradient(circle at 30% 30%, rgba(34, 211, 238, 0.18), rgba(2, 6, 23, 0.6));
    border: 0.5px solid rgba(34, 211, 238, 0.3);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 5px rgba(34, 211, 238, 0.18);
  }
  .preset-icon { font-size: 15px; line-height: 1; }
  .preset-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .preset-name {
    font-family: 'DM Serif Display', serif;
    font-size: 0.98rem;
    color: var(--text);
    line-height: 1.15;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .preset-desc {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.3;
    letter-spacing: 0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Disco — clean inside, rainbow glow OUTSIDE */
  .preset-btn.disco {
    border-color: rgba(207, 250, 254, 0.22);
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.40), rgba(2, 6, 23, 0.50));
    animation: discoRainbow 6s linear infinite;
  }
  @keyframes discoRainbow {
    0%   { box-shadow: 0 0 16px -4px rgba(239,68,68,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
    16%  { box-shadow: 0 0 16px -4px rgba(249,115,22,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
    33%  { box-shadow: 0 0 16px -4px rgba(251,191,36,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
    50%  { box-shadow: 0 0 16px -4px rgba(34,197,94,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
    66%  { box-shadow: 0 0 16px -4px rgba(59,130,246,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
    83%  { box-shadow: 0 0 16px -4px rgba(168,85,247,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
    100% { box-shadow: 0 0 16px -4px rgba(239,68,68,0.75), inset 0 1px 0 rgba(207, 250, 254, 0.06); }
  }

  /* ===== Morse section (own row, like the original) ===== */
  .morse-section {
    width: 100%;
    margin-top: 1rem;
  }
  .morse-btn {
    width: 100%;
    background: linear-gradient(160deg, rgba(76, 29, 86, 0.40), rgba(2, 6, 23, 0.55));
    border: 0.5px solid rgba(244, 114, 182, 0.30);
    border-radius: 16px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    touch-action: manipulation;
    min-height: 64px;
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 22px -8px rgba(244, 114, 182, 0.45), inset 0 1px 0 rgba(244, 114, 182, 0.08);
    animation: morseGlow 5s ease-in-out infinite;
  }
  .morse-btn:active { transform: scale(0.97); filter: brightness(1.5); }
  .morse-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(244, 114, 182, 0.45), rgba(76, 29, 86, 0.6));
    border: 0.5px solid rgba(244, 114, 182, 0.5);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 6px rgba(244, 114, 182, 0.3);
    font-size: 18px;
    flex-shrink: 0;
  }
  .morse-body { flex: 1; min-width: 0; }
  .morse-code {
    font-family: 'SF Mono', Menlo, monospace;
    color: #fbcfe8;
    font-size: 1.05rem;
    letter-spacing: 0.45em;
    line-height: 1;
  }
  .morse-arrow { color: rgba(251, 207, 232, 0.45); font-size: 18px; }
  @keyframes morseGlow {
    0%, 100% { box-shadow: 0 0 22px -8px rgba(244, 114, 182, 0.45), inset 0 1px 0 rgba(244, 114, 182, 0.08); }
    50%      { box-shadow: 0 0 34px -4px rgba(244, 114, 182, 0.6),  inset 0 1px 0 rgba(244, 114, 182, 0.12); }
  }

  /* ===== Time of day pair (sunrise → sunset gradient horizon) ===== */
  .day-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    position: relative;
  }
  .day-row::before {
    content: '';
    position: absolute;
    left: 8%; right: 8%;
    top: 50%;
    height: 1.5px;
    transform: translateY(-50%);
    background: linear-gradient(90deg,
      rgba(251, 191, 36, 0.55) 0%,
      rgba(244, 114, 182, 0.40) 50%,
      rgba(192, 132, 252, 0.55) 100%);
    filter: blur(0.5px);
    border-radius: 1px;
    z-index: 0;
    pointer-events: none;
  }
  .day-btn {
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.40), rgba(2, 6, 23, 0.55));
    border: 0.5px solid var(--accent, rgba(34, 211, 238, 0.3));
    border-radius: 16px;
    padding: 0.9rem 0.8rem;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    box-shadow: 0 0 18px -6px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.06);
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    position: relative;
    z-index: 1;
    min-height: 90px;
    color: var(--text);
  }
  .day-btn:active { transform: scale(0.97); filter: brightness(1.5); }
  .day-btn.active {
    box-shadow: 0 0 22px -2px var(--accent), 0 0 48px -10px var(--accent), inset 0 1px 0 rgba(207, 250, 254, 0.1);
  }
  .day-btn.morning { --accent: rgba(251, 191, 36, 0.5); }
  .day-btn.evening { --accent: rgba(192, 132, 252, 0.55); }
  .day-icon { font-size: 28px; line-height: 1; }
  .day-name {
    font-family: 'DM Serif Display', serif;
    font-size: 0.98rem;
    color: var(--text);
  }
  .day-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Custom preset (inline, at the bottom of modes tab) */
  .custom-section {
    width: 100%;
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.30), rgba(2, 6, 23, 0.45));
    border: 0.5px solid rgba(34, 211, 238, 0.15);
    border-radius: 16px;
    padding: 1.1rem;
    margin-top: 1.25rem;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .custom-label { font-size: 10.5px; color: var(--cyan-soft); opacity: 0.7; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 10px; }
  .custom-row { display: flex; gap: 8px; }
  .custom-input {
    flex: 1;
    background: rgba(2, 6, 23, 0.6);
    border: 0.5px solid rgba(34, 211, 238, 0.18);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .custom-input::placeholder { color: #475569; }
  .custom-input:focus {
    border-color: rgba(34, 211, 238, 0.55);
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.13);
  }
  .send-btn {
    background: rgba(8, 145, 178, 0.22);
    border: 0.5px solid rgba(34, 211, 238, 0.35);
    border-radius: 10px;
    padding: 12px 18px;
    color: #cffafe;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    touch-action: manipulation;
    min-height: 48px;
    letter-spacing: 0.05em;
    transition: transform 0.15s;
  }
  .send-btn:active { transform: scale(0.97); }

  /* ===== Pixel editor ===== */
  .pixel-intro {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: #cffafe;
    margin-bottom: 10px;
    margin-top: 0.5rem;
    text-align: center;
  }
  .pixel-sub {
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .palette {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    padding: 0.75rem;
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.25), rgba(2, 6, 23, 0.40));
    border: 0.5px solid rgba(34, 211, 238, 0.12);
    border-radius: 14px;
    margin-bottom: 1rem;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .swatch {
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 1.5px solid rgba(207, 250, 254, 0.15);
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.4);
    touch-action: manipulation;
  }
  .swatch.active {
    transform: scale(1.15);
    border-color: rgba(207, 250, 254, 0.7);
    box-shadow: 0 0 12px var(--swatch-color, currentColor), inset 0 0 4px rgba(0,0,0,0.3);
  }
  .swatch.custom-swatch {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    position: relative;
  }
  .swatch.custom-swatch input[type="color"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    border: none;
  }

  .canvas-wrap {
    background: linear-gradient(160deg, rgba(8, 47, 73, 0.35), rgba(2, 6, 23, 0.55));
    border: 0.5px solid rgba(34, 211, 238, 0.18);
    border-radius: 18px;
    padding: 1rem 0.6rem;
    margin-bottom: 1rem;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 0 20px -8px rgba(34, 211, 238, 0.2), inset 0 1px 0 rgba(207, 250, 254, 0.05);
  }
  #pixel-canvas { width: 100%; height: auto; display: block; }
  .fish-body {
    fill: rgba(30, 64, 110, 0.55);
    stroke: rgba(125, 211, 252, 0.45);
    stroke-width: 0.6;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .fish-detail {
    fill: none;
    stroke: rgba(125, 211, 252, 0.28);
    stroke-width: 0.35;
    stroke-linecap: round;
  }
  .fish-eye {
    fill: rgba(207, 250, 254, 0.55);
    stroke: rgba(207, 250, 254, 0.8);
    stroke-width: 0.35;
  }
  .fish-eye-pupil { fill: #020617; }
  .led-hit { fill: transparent; cursor: pointer; }
  .led {
    fill: rgba(207, 250, 254, 0.30);
    stroke: rgba(207, 250, 254, 0.60);
    stroke-width: 0.35;
    pointer-events: none;
    transition: fill 0.2s, stroke 0.2s, stroke-width 0.2s;
  }
  .led-group.lit .led {
    fill: currentColor;
    stroke: currentColor;
    stroke-width: 0.9;
    animation: ledPulse 2.5s ease-in-out infinite;
  }
  @keyframes ledPulse {
    0%, 100% { filter: drop-shadow(0 0 2px currentColor); }
    50%      { filter: drop-shadow(0 0 5px currentColor); }
  }

  .pixel-actions { display: flex; gap: 10px; }
  .pixel-actions button {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    min-height: 48px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: transform 0.15s;
  }
  .pixel-actions button:active { transform: scale(0.97); }
  .btn-clear {
    background: rgba(71, 85, 105, 0.25);
    border: 0.5px solid rgba(148, 163, 184, 0.3);
    color: #cbd5e1;
  }
  .btn-send {
    background: linear-gradient(180deg, rgba(34, 211, 238, 0.30), rgba(8, 145, 178, 0.15));
    border: 0.5px solid rgba(34, 211, 238, 0.5);
    color: #cffafe;
    box-shadow: 0 0 20px -4px rgba(34, 211, 238, 0.3);
  }

  /* Log */
  .log-wrap { width: 100%; max-width: 380px; margin-top: 1.5rem; margin-bottom: 1rem; }
  .log-toggle {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--cyan-soft);
    opacity: 0.55;
    font-size: 10.5px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 6px 0;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .log-toggle .chev { transition: transform 0.25s; display: inline-block; }
  .log-toggle.expanded .chev { transform: rotate(180deg); }
  .log {
    width: 100%;
    background:
      repeating-linear-gradient(180deg, transparent 0, transparent 2px, rgba(34, 211, 238, 0.025) 2px, rgba(34, 211, 238, 0.025) 3px),
      rgba(2, 6, 23, 0.55);
    border: 0.5px solid rgba(34, 211, 238, 0.13);
    border-radius: 14px;
    padding: 0.85rem 1rem;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    color: #475569;
    max-height: 0;
    overflow-y: auto;
    line-height: 1.8;
    transition: max-height 0.3s ease, padding 0.3s, opacity 0.25s;
    opacity: 0;
    margin-top: 6px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .log.expanded { max-height: 140px; opacity: 1; padding: 0.85rem 1rem; }
  .log-entry::before { content: '> '; color: var(--cyan-bright); opacity: 0.6; }
  .log-entry.ok   { color: #6ee7b7; }
  .log-entry.err  { color: #fca5a5; }
  .log-entry.info { color: #7dd3fc; }

  /* Snake game */
  .snake-score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .snake-score { font-size: 1rem; color: var(--cyan-soft); font-family: 'SF Mono', Menlo, monospace; letter-spacing: 0.05em; }
  .snake-start-btn {
    background: linear-gradient(160deg, rgba(8,47,73,0.55), rgba(2,6,23,0.55));
    border: 0.5px solid rgba(34,211,238,0.35); color: #cffafe;
    border-radius: 12px; padding: 8px 20px;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none;
  }
  .snake-start-btn.running { border-color: rgba(248,113,113,0.45); color: #fca5a5; }
  .snake-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px;
    background: rgba(2,6,23,0.5); border: 0.5px solid rgba(34,211,238,0.12);
    border-radius: 14px; padding: 12px; margin-bottom: 1.25rem;
  }
  .snake-cell {
    aspect-ratio: 1; border-radius: 50%;
    background: rgba(34,211,238,0.05); border: 0.5px solid rgba(34,211,238,0.08);
    transition: background 0.12s, box-shadow 0.12s;
  }
  .snake-cell.head { background: #00ff80; box-shadow: 0 0 8px rgba(0,255,128,0.65); border-color: transparent; }
  .snake-cell.body { background: #00994d; box-shadow: 0 0 4px rgba(0,153,77,0.45); border-color: transparent; }
  .snake-cell.food { background: #ff4400; box-shadow: 0 0 9px rgba(255,68,0,0.7); border-color: transparent; }
  .snake-cell.dead { background: #ff1020; box-shadow: 0 0 6px rgba(255,16,32,0.5); border-color: transparent; }
  .dpad { display: flex; flex-direction: column; align-items: center; gap: 5px; margin: 0 auto; width: fit-content; }
  .dpad-middle { display: flex; align-items: center; gap: 5px; }
  .dpad-center { width: 56px; height: 56px; }
  .dpad-btn {
    width: 56px; height: 56px;
    background: linear-gradient(160deg, rgba(8,47,73,0.6), rgba(2,6,23,0.6));
    border: 0.5px solid rgba(34,211,238,0.28); color: #7dd3fc;
    border-radius: 14px; font-size: 1.15rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; -webkit-appearance: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .dpad-btn:active { background: rgba(34,211,238,0.14); border-color: rgba(34,211,238,0.55); }
  .snake-status {
    text-align: center; font-size: 0.8rem; color: var(--muted);
    margin-top: 0.85rem; min-height: 1.2em;
  }
  .snake-status.gameover { color: #fca5a5; }
  .snake-status.win { color: #6ee7b7; }
</style>
</head>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Fill these in with your own values. Never commit the version with real creds.
// BROKER: WebSocket URL of your MQTT broker, e.g. 'wss://your-broker.com:8084/mqtt'
// TOPIC:  Your WLED device's MQTT topic, e.g. 'wled/YOUR_DEVICE_ID/api'
const BROKER = 'YOUR_BROKER_URL';
const TOPIC  = 'YOUR_WLED_TOPIC';
// ─────────────────────────────────────────────────────────────────────────────
let client = null;
let connected = false;
let lightOn = false;

function setStatus(state, text) {
  document.getElementById('dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}
function setPowerUI(state) {
  const btn = document.getElementById('power-btn');
  btn.classList.remove('on', 'connecting', 'error');
  if (state) btn.classList.add(state);
}
function addLog(msg, type) {
  const l = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-entry ' + (type || '');
  d.textContent = msg;
  l.appendChild(d);
  l.scrollTop = l.scrollHeight;
}
function setActivePreset(num) {
  document.querySelectorAll('.preset-btn, .arc-item, .day-btn').forEach(b => b.classList.remove('active'));
  if (num != null) {
    const sel = '[data-preset="' + num + '"]';
    document.querySelectorAll(sel).forEach(b => {
      if (b.classList.contains('preset-btn') || b.classList.contains('arc-item') || b.classList.contains('day-btn')) {
        b.classList.add('active');
      }
    });
  }
}

function connectBroker() {
  return new Promise((resolve, reject) => {
    if (connected) { resolve(); return; }
    setStatus('sending', 'connecting...');
    setPowerUI('connecting');
    addLog('connecting...', 'info');
    const id = 'orion_' + Math.random().toString(16).substr(2,8);
    client = mqtt.connect(BROKER, { clientId: id, clean: true, connectTimeout: 10000, reconnectPeriod: 0 });
    client.on('connect', () => {
      connected = true;
      setStatus('success', 'connected');
      addLog('connected — ready to send', 'ok');
      setPowerUI(lightOn ? 'on' : null);
      resolve();
    });
    client.on('error', (e) => {
      connected = false;
      setStatus('error', 'error');
      setPowerUI('error');
      addLog('error: ' + (e.message || e), 'err');
      reject(e);
    });
    client.on('close', () => {
      if (connected) {
        connected = false; lightOn = false;
        setStatus('error', 'disconnected');
        setPowerUI(null);
        addLog('disconnected', 'err');
      }
    });
  });
}
function publish(payload) {
  return new Promise((resolve, reject) => {
    if (!connected || !client) { reject(new Error('not connected')); return; }
    client.publish(TOPIC, payload, {qos: 0}, (err) => { if (err) reject(err); else resolve(); });
  });
}
async function ensureConnected() {
  if (connected) return true;
  try { await connectBroker(); return true; } catch { return false; }
}

async function sendPreset(num, name) {
  setStatus('sending', 'sending...');
  try {
    await publish('PL=' + num);
    setStatus('success', 'sent');
    addLog('preset ' + num + ' (' + name + ') sent', 'ok');
    return true;
  } catch {
    setStatus('error', 'failed');
    addLog('send failed', 'err');
    return false;
  }
}

async function togglePower() {
  if (!(await ensureConnected())) return;
  if (lightOn) {
    const ok = await sendPreset(10, 'light off');
    if (ok) { lightOn = false; setPowerUI(null); setActivePreset(null); }
  } else {
    const ok = await sendPreset(1, 'default');
    if (ok) { lightOn = true; setPowerUI('on'); setActivePreset(1); }
  }
}

function emitBubbles(x, y, n) {
  n = n || 4;
  for (let i = 0; i < n; i++) {
    const b = document.createElement('div');
    b.className = 'tap-bubble';
    b.style.left = x + 'px';
    b.style.top  = y + 'px';
    const size = 5 + Math.random() * 9;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.setProperty('--dx', ((Math.random() - 0.5) * 50) + 'px');
    b.style.animationDuration = (1 + Math.random() * 0.6) + 's';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 1700);
  }
}

document.querySelectorAll('.tab-btn').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

document.getElementById('log-toggle').addEventListener('click', (e) => {
  e.currentTarget.classList.toggle('expanded');
  document.getElementById('log').classList.toggle('expanded');
});

function addTapListener(el, fn) {
  el.addEventListener('click', (e) => fn(e));
  el.addEventListener('touchend', function(e) { e.preventDefault(); fn(e); });
}

addTapListener(document.getElementById('power-btn'), (e) => {
  const rect = e.currentTarget ? e.currentTarget.getBoundingClientRect() : null;
  if (rect) emitBubbles(rect.left + rect.width/2, rect.top + rect.height/2, 6);
  togglePower();
});

addTapListener(document.getElementById('chip-call'), async (e) => {
  if (!(await ensureConnected())) return;
  if (e && e.clientX != null) emitBubbles(e.clientX, e.clientY, 4);
  const ok = await sendPreset(16, 'calling');
  if (ok) { lightOn = true; setPowerUI('on'); setActivePreset(null); }
});
addTapListener(document.getElementById('chip-default'), async (e) => {
  if (!(await ensureConnected())) return;
  if (e && e.clientX != null) emitBubbles(e.clientX, e.clientY, 4);
  const ok = await sendPreset(1, 'default');
  if (ok) { lightOn = true; setPowerUI('on'); setActivePreset(1); }
});

addTapListener(document.getElementById('custom-send'), async () => {
  const val = document.getElementById('custom-num').value;
  if (!val) return;
  if (!(await ensureConnected())) return;
  const ok = await sendPreset(val, 'preset ' + val);
  if (ok) { lightOn = true; setPowerUI('on'); setActivePreset(val); }
});

/* All tappable preset surfaces: arc items, preset buttons, day buttons, morse */
document.querySelectorAll('.arc-item, .preset-btn, .day-btn, .morse-btn').forEach(btn => {
  addTapListener(btn, async (e) => {
    if (!(await ensureConnected())) return;
    if (e && e.touches && e.touches[0]) {
      emitBubbles(e.touches[0].clientX, e.touches[0].clientY, 3);
    } else if (e && e.clientX != null) {
      emitBubbles(e.clientX, e.clientY, 3);
    }
    const ok = await sendPreset(btn.dataset.preset, btn.dataset.name);
    if (ok) {
      lightOn = true; setPowerUI('on');
      // Morse doesn't get a persistent active marker (it's a signal, not a mode)
      if (btn.classList.contains('morse-btn')) setActivePreset(null);
      else setActivePreset(btn.dataset.preset);
    }
  });
});

/* ===== Pixel editor =====
 * Top-down pleco view, both pectoral fins extended (modeled on pleco-icon.png).
 * Total: 47 LEDs.
 * Wiring order (matches the physical strand):
 *   0-4   tail fan
 *   5-28  body, 6 columns × 4 rows, wired column-by-column from tail end to head end
 *   29-33 left pectoral fin
 *   34-38 right pectoral fin
 *   39-46 head (back of head → snout)
 */
const LED_POSITIONS = [
  // 0-4: tail fan (right side)
  {x: 228, y: 80},
  {x: 218, y: 56}, {x: 218, y: 104},
  {x: 206, y: 46}, {x: 206, y: 114},

  // 5-28: body, 6 cols x 4 rows, tail-to-front column order
  // col @ x=162
  {x: 162, y: 60}, {x: 162, y: 74}, {x: 162, y: 86}, {x: 162, y: 98},
  // col @ x=144
  {x: 144, y: 60}, {x: 144, y: 74}, {x: 144, y: 86}, {x: 144, y: 98},
  // col @ x=126
  {x: 126, y: 60}, {x: 126, y: 74}, {x: 126, y: 86}, {x: 126, y: 98},
  // col @ x=108
  {x: 108, y: 60}, {x: 108, y: 74}, {x: 108, y: 86}, {x: 108, y: 98},
  // col @ x=90
  {x:  90, y: 60}, {x:  90, y: 74}, {x:  90, y: 86}, {x:  90, y: 98},
  // col @ x=74
  {x:  74, y: 60}, {x:  74, y: 74}, {x:  74, y: 86}, {x:  74, y: 98},

  // 29-33: left pectoral fin (5 LEDs, fan up)
  {x:  74, y: 44}, {x:  86, y: 30}, {x: 102, y: 18}, {x: 116, y: 22}, {x: 124, y: 38},

  // 34-38: right pectoral fin (5 LEDs, fan down)
  {x:  74, y: 114}, {x:  86, y: 128}, {x: 102, y: 140}, {x: 116, y: 136}, {x: 124, y: 120},

  // 39-46: head (8 LEDs)
  {x:  60, y: 60}, {x:  60, y: 98},
  {x:  48, y: 56}, {x:  48, y: 80}, {x:  48, y: 102},
  {x:  34, y: 60}, {x:  34, y: 100},
  {x:  22, y: 80}
];

const PALETTE = [
  'ffffff', 'ff3030', 'ff8000', 'ffd400',
  '40ff40', '00d4d4', '3070ff', '6020ff',
  'd040ff', 'ff40b0', 'ff80c0', '203050'
];

let currentColor = PALETTE[2];
const pixelState = new Array(LED_POSITIONS.length).fill(null);

function renderPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  PALETTE.forEach((hex) => {
    const s = document.createElement('button');
    s.className = 'swatch';
    s.style.background = '#' + hex;
    s.style.setProperty('--swatch-color', '#' + hex);
    s.dataset.color = hex;
    if (hex === currentColor) s.classList.add('active');
    addTapListener(s, () => {
      currentColor = hex;
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    });
    pal.appendChild(s);
  });
  const custom = document.createElement('label');
  custom.className = 'swatch custom-swatch';
  custom.title = 'custom color';
  const input = document.createElement('input');
  input.type = 'color';
  input.value = '#' + currentColor;
  input.addEventListener('input', (e) => {
    currentColor = e.target.value.replace('#','').toLowerCase();
    custom.style.setProperty('--swatch-color', e.target.value);
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    custom.classList.add('active');
  });
  custom.appendChild(input);
  pal.appendChild(custom);
}

function renderLEDs() {
  const g = document.getElementById('leds');
  g.innerHTML = '';
  LED_POSITIONS.forEach((p, idx) => {
    const ledGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    ledGroup.setAttribute('class', 'led-group');
    ledGroup.setAttribute('data-index', idx);

    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hit.setAttribute('class', 'led-hit');
    hit.setAttribute('cx', p.x);
    hit.setAttribute('cy', p.y);
    hit.setAttribute('r', 6.5);

    const led = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    led.setAttribute('class', 'led');
    led.setAttribute('cx', p.x);
    led.setAttribute('cy', p.y);
    led.setAttribute('r', 3.2);

    ledGroup.appendChild(hit);
    ledGroup.appendChild(led);
    g.appendChild(ledGroup);

    addTapListener(ledGroup, () => {
      if (pixelState[idx] === currentColor) {
        pixelState[idx] = null;
      } else {
        pixelState[idx] = currentColor;
      }
      paintLED(idx);
    });
  });
}

function paintLED(idx) {
  const ledGroup = document.querySelector('.led-group[data-index="' + idx + '"]');
  if (!ledGroup) return;
  const color = pixelState[idx];
  if (color) {
    ledGroup.classList.add('lit');
    ledGroup.style.color = '#' + color;
  } else {
    ledGroup.classList.remove('lit');
    ledGroup.style.color = '';
  }
}
function paintAllLEDs() { for (let i = 0; i < pixelState.length; i++) paintLED(i); }

async function sendPixels() {
  if (!(await ensureConnected())) return;
  const arr = [];
  for (let i = 0; i < pixelState.length; i++) {
    arr.push(i);
    arr.push(pixelState[i] || '000000');
  }
  const payload = JSON.stringify({ on: true, bri: 255, seg: { i: arr } });
  setStatus('sending', 'sending pixels...');
  try {
    await publish(payload);
    setStatus('success', 'pixels sent');
    const lit = pixelState.filter(c => c).length;
    addLog('sent ' + lit + ' lit pixel(s)', 'ok');
    lightOn = lit > 0; setPowerUI(lit > 0 ? 'on' : null);
    setActivePreset(null);
  } catch {
    setStatus('error', 'failed');
    addLog('pixel send failed', 'err');
  }
}

function clearPixels() {
  for (let i = 0; i < pixelState.length; i++) pixelState[i] = null;
  paintAllLEDs();
}

renderPalette();
renderLEDs();
addTapListener(document.getElementById('btn-send-pixels'), sendPixels);
addTapListener(document.getElementById('btn-clear'), clearPixels);

/* ===== Snake game =====
 * Playfield: body LEDs 5-28 (6 cols × 4 rows, col 0 = tail end, col 5 = head end)
 * Tick: 2 s to accommodate ~1 s MQTT latency
 * LED mapping: snakeLED(row, col) = 5 + col*4 + row
 */
const SNAKE_COLS = 6;
const SNAKE_ROWS = 4;
const SNAKE_TICK = 2000;

function snakeLED(row, col) { return 5 + col * 4 + row; }

let snake = [];
let snakeFood = null;
let snakeDir = {dr: 0, dc: 1};
let snakeNextDir = {dr: 0, dc: 1};
let snakeScore = 0;
let snakeRunning = false;
let snakeTimer = null;

function buildSnakeGrid() {
  const grid = document.getElementById('snake-grid');
  grid.innerHTML = '';
  for (let r = 0; r < SNAKE_ROWS; r++) {
    for (let c = 0; c < SNAKE_COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'snake-cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      grid.appendChild(cell);
    }
  }
}

function snakeGetCell(r, c) {
  return document.querySelector('#snake-grid [data-r="'+r+'"][data-c="'+c+'"]');
}

function snakeRedraw(gameOverFlash) {
  const headKey = snake[0] ? snake[0].r + ',' + snake[0].c : null;
  const bodyKeys = new Set(snake.slice(1).map(s => s.r + ',' + s.c));
  const foodKey = snakeFood ? snakeFood.r + ',' + snakeFood.c : null;
  for (let r = 0; r < SNAKE_ROWS; r++) {
    for (let c = 0; c < SNAKE_COLS; c++) {
      const cell = snakeGetCell(r, c);
      if (!cell) continue;
      const k = r + ',' + c;
      cell.className = 'snake-cell';
      if (gameOverFlash && (headKey === k || bodyKeys.has(k))) cell.classList.add('dead');
      else if (headKey === k) cell.classList.add('head');
      else if (bodyKeys.has(k)) cell.classList.add('body');
      else if (k === foodKey) cell.classList.add('food');
    }
  }
}

async function snakeSendLEDs(gameOverFlash) {
  if (!connected) return;
  const colors = new Array(LED_POSITIONS.length).fill('000000');
  if (gameOverFlash) {
    for (let i = 5; i <= 28; i++) colors[i] = 'ff1020';
  } else {
    if (snakeFood) colors[snakeLED(snakeFood.r, snakeFood.c)] = 'ff4400';
    snake.slice(1).forEach(s => { colors[snakeLED(s.r, s.c)] = '009944'; });
    if (snake[0]) colors[snakeLED(snake[0].r, snake[0].c)] = '00ff80';
  }
  const arr = [];
  colors.forEach((c, i) => arr.push(i, c));
  const payload = JSON.stringify({ on: true, bri: 255, seg: { i: arr } });
  try { await publish(payload); } catch {}
}

function snakePlaceFood() {
  const occupied = new Set(snake.map(s => s.r + ',' + s.c));
  const empty = [];
  for (let r = 0; r < SNAKE_ROWS; r++)
    for (let c = 0; c < SNAKE_COLS; c++)
      if (!occupied.has(r + ',' + c)) empty.push({r, c});
  if (!empty.length) { snakeFood = null; return; }
  snakeFood = empty[Math.floor(Math.random() * empty.length)];
}

function snakeSetDir(dr, dc) {
  if (!snakeRunning) return;
  if (dr === -snakeDir.dr && dc === -snakeDir.dc) return;
  snakeNextDir = {dr, dc};
}

function snakeTick() {
  snakeDir = snakeNextDir;
  const head = snake[0];
  const newHead = {r: head.r + snakeDir.dr, c: head.c + snakeDir.dc};

  if (newHead.r < 0 || newHead.r >= SNAKE_ROWS || newHead.c < 0 || newHead.c >= SNAKE_COLS
      || snake.some(s => s.r === newHead.r && s.c === newHead.c)) {
    snakeGameOver(); return;
  }

  snake.unshift(newHead);
  const ate = snakeFood && newHead.r === snakeFood.r && newHead.c === snakeFood.c;
  if (ate) {
    snakeScore++;
    document.getElementById('snake-score').textContent = snakeScore;
    snakePlaceFood();
    if (!snakeFood) { snakeWin(); return; }
  } else {
    snake.pop();
  }
  snakeRedraw(false);
  snakeSendLEDs(false);
}

function snakeStopTimer() {
  if (snakeTimer) { clearInterval(snakeTimer); snakeTimer = null; }
  snakeRunning = false;
  const btn = document.getElementById('snake-start');
  btn.textContent = 'start';
  btn.classList.remove('running');
}

function snakeStart() {
  snakeStopTimer();
  snake = [{r: 1, c: 1}, {r: 1, c: 0}];
  snakeDir = {dr: 0, dc: 1};
  snakeNextDir = {dr: 0, dc: 1};
  snakeScore = 0;
  document.getElementById('snake-score').textContent = '0';
  const status = document.getElementById('snake-status');
  status.textContent = '';
  status.className = 'snake-status';
  const btn = document.getElementById('snake-start');
  btn.textContent = 'stop';
  btn.classList.add('running');
  snakePlaceFood();
  snakeRunning = true;
  snakeRedraw(false);
  snakeSendLEDs(false);
  snakeTimer = setInterval(snakeTick, SNAKE_TICK);
}

async function snakeGameOver() {
  snakeStopTimer();
  snakeRedraw(true);
  await snakeSendLEDs(true);
  const status = document.getElementById('snake-status');
  status.textContent = 'game over — score: ' + snakeScore;
  status.className = 'snake-status gameover';
  setTimeout(() => { snakeRedraw(false); snakeSendLEDs(false); }, 1800);
}

function snakeWin() {
  snakeStopTimer();
  snakeRedraw(false);
  snakeSendLEDs(false);
  const status = document.getElementById('snake-status');
  status.textContent = 'you win!! score: ' + snakeScore;
  status.className = 'snake-status win';
}

buildSnakeGrid();
addTapListener(document.getElementById('snake-start'), () => {
  if (snakeRunning) snakeStopTimer();
  else snakeStart();
});
addTapListener(document.getElementById('dpad-up'),    () => snakeSetDir(-1, 0));
addTapListener(document.getElementById('dpad-down'),  () => snakeSetDir(1,  0));
addTapListener(document.getElementById('dpad-left'),  () => snakeSetDir(0, -1));
addTapListener(document.getElementById('dpad-right'), () => snakeSetDir(0,  1));

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('tab-snake').classList.contains('active')) return;
  if (e.key === 'ArrowUp')    snakeSetDir(-1, 0);
  if (e.key === 'ArrowDown')  snakeSetDir(1,  0);
  if (e.key === 'ArrowLeft')  snakeSetDir(0, -1);
  if (e.key === 'ArrowRight') snakeSetDir(0,  1);
});
</script>
</body>
</html>
